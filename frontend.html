<!DOCTYPE html>
<html>
<head>
    <title>Calendar AI</title>
</head>
<body>
    <h1>Calendar AI Dashboard</h1>

    <button onclick="login()">Login with Google</button>
    <br><br>
    <button onclick="getEvents()">Get Events</button>
    <button onclick="createEvent()">Create Test Event</button>
    <div id = "calendar" style = "display: none;">
        <select name = "calendars" id = "calendars">
            <option value = "primary"> Primary </option>
        </select>
        <input placeholder="date" id = "dateInput_event" type = "date">
        <input placeholder = "start_time" id = "start_time" type = "time">
        <input placeholder="end_time" id = "end_time" type = "time">
        <button onclick="submit_event()">Create</button>
    </div>
    <br><br>

    <button onclick = "getTasks()">Get Tasks</button>
    <button onclick = "createTasks()">Add Tasks</button>
    <div id = "task" style = "display: none;">
        <input placeholder="title" id = "title_task" type = "string">
        <input placeholder = "deadline date" id = "dateInput_task" type = "date">
        <input placeholder="duration hours" id = "duration_task" type = "number" step = "0.5" min = "0.5">
        <button onclick="add_task()">Add</button>
    </div>
    <div id="task-preview" style="margin-top: 12px; display: none;">
        <h3>Task Preview</h3>
        <ul id="task-list"></ul>
        <button onclick="schedule_tasks()">Schedule</button>
    </div>


    <pre id="output"></pre>

    <script>
        const API_BASE = "http://localhost:8000";
        const tempTasks = [];

        function login() {
            // Redirect user to backend OAuth route
            window.location.href = API_BASE + "/auth/login";
        }

        async function getEvents() {
            try {
                const res = await fetch("http://localhost:8000/events");
                const data = await res.json();
                document.getElementById("output").textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById("output").textContent = "Fetch failed: " + err.message;
            }
        }

        
        function createEvent() {
            const panel = document.getElementById("calendar");
            if (!panel) {
                document.getElementById("output").textContent = "calendar div not found";
                return;
            }
            panel.style.display = "block";
        }

        function createTasks(){
            const panel = document.getElementById("task");
            if (!panel) {
                document.getElementById("output").textContent = "task div not found";
                return;
            }
            panel.style.display = "block";
        }

        function add_task(){
            const title = document.getElementById("title_task").value.trim();
            const deadline = document.getElementById("dateInput_task").value;
            const durationRaw = document.getElementById("duration_task").value;
            const duration = parseFloat(durationRaw);

            if (!title || !deadline || isNaN(duration) || duration <= 0) {
                document.getElementById("output").textContent = "Please provide title, deadline date, and duration hours.";
                return;
            }

            tempTasks.push({
                title: title,
                deadline: deadline,
                estimated_duration: duration
            });

            document.getElementById("title_task").value = "";
            document.getElementById("dateInput_task").value = "";
            document.getElementById("duration_task").value = "";

            render_task_preview();
        }

        function render_task_preview(){
            const preview = document.getElementById("task-preview");
            const list = document.getElementById("task-list");
            list.innerHTML = "";

            if (tempTasks.length === 0) {
                preview.style.display = "none";
                return;
            }

            tempTasks.forEach((task, idx) => {
                const li = document.createElement("li");
                li.textContent = `${idx + 1}. ${task.title} | deadline: ${task.deadline} | duration: ${task.estimated_duration}h`;
                list.appendChild(li);
            });

            preview.style.display = "block";
        }

        async function schedule_tasks(){
            if (tempTasks.length === 0) {
                document.getElementById("output").textContent = "No tasks to schedule.";
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/schedule-tasks`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ tasks: tempTasks, calendar: "primary" })
                });
                const data = await res.json();
                document.getElementById("output").textContent = JSON.stringify(data, null, 2);
                if (res.ok && !data.error) {
                    tempTasks.length = 0;
                    render_task_preview();
                    document.getElementById("task").style.display = "none";
                }
            } catch (err) {
                document.getElementById("output").textContent = "Schedule failed: " + err.message;
            }
        }

        async function getTasks(){
            try{
                const res = await fetch("http://localhost:8000/get-tasks")
                const data = await res.json();
                document.getElementById("output").textContent = JSON.stringify(data, null, 2);
            }catch (err) {
                document.getElementById("output").textContent = "Fatech failed";
            }
        }
        async function submit_event() {
            //const res = await fetch("http://localhost:8000/create-test-event");
            //const data = await res.json();
            //document.getElementById("output").textContent = JSON.stringify(data, null, 2);
            
            const calendar = document.getElementById("calendars").value;
            const time = document.getElementById("dateInput").value;
            const start = document.getElementById("start_time").value;
            const end = document.getElementById("end_time").value;

            const res = await fetch (`${API_BASE}/create-test-event?calendar=${calendar}&date=${time}&start=${start}&end=${end}`)
            document.getElementById("calendar").style.display = "none";
        }

        async function getKeywords() {
            const res = await fetch(API_BASE + "/create-test-event");
            const data = await res.json();
            document.getElementById("output").textContent =
                JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
